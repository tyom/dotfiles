name: Smoke Test

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_COLOR: 3

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pages now deploys via the "Repo Intel" workflow (Actions source), not
      # the legacy Jekyll builder — so wait on that run for this commit rather
      # than polling the legacy pages/builds API.
      - name: Wait for Repo Intel Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for the Repo Intel Pages deploy of ${{ github.sha }}..."
          for i in {1..40}; do
            run=$(gh api \
              "repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&per_page=100" \
              --jq '[.workflow_runs[] | select(.name == "Repo Intel")]
                    | sort_by(.created_at) | last // empty')
            if [ -z "$run" ]; then
              echo "No Repo Intel run yet - waiting... ($i/40)"
              sleep 15
              continue
            fi
            status=$(echo "$run" | jq -r '.status')
            conclusion=$(echo "$run" | jq -r '.conclusion // ""')
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "Repo Intel Pages deploy completed successfully"
                exit 0
              fi
              echo "Repo Intel run concluded '$conclusion' - aborting smoke test"
              exit 1
            fi
            echo "Repo Intel status: $status - waiting... ($i/40)"
            sleep 15
          done
          echo "Timed out waiting for the Repo Intel Pages deploy"
          exit 1

      - name: Test remote install (with Homebrew)
        run: make docker-test-remote
